# Creatly — wildcard subdomain config
# Place this file at /etc/nginx/sites-available/creatly.conf
# Then: ln -s /etc/nginx/sites-available/creatly.conf /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

# Main domain — redirect to app or show landing
server {
    listen 80;
    server_name creatly.ru www.creatly.ru;

    # For Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Wildcard subdomains — serve published sites
server {
    listen 80;
    server_name *.creatly.ru;

    # For Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main domain (proxy to Next.js app)
server {
    listen 443 ssl;
    server_name creatly.ru www.creatly.ru;

    ssl_certificate /etc/letsencrypt/live/creatly.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/creatly.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — wildcard subdomains (serve static sites)
server {
    listen 443 ssl;
    server_name *.creatly.ru;

    ssl_certificate /etc/letsencrypt/live/creatly.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/creatly.ru/privkey.pem;

    # Extract subdomain from Host header
    set $subdomain "";
    if ($host ~* ^([a-z0-9-]+)\.creatly\.ru$) {
        set $subdomain $1;
    }

    root /var/www/creatly/$subdomain;
    index index.html;

    # CORS for API calls (lead forms)
    add_header Access-Control-Allow-Origin "https://creatly.ru" always;
    add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # Proxy /api/ requests to the main app
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host creatly.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 404 fallback
    error_page 404 /index.html;
}
