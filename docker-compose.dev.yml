services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sitebuilder
      POSTGRES_PASSWORD: sitebuilder_dev
      POSTGRES_DB: sitebuilder
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitebuilder"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
