# Nginx config for sites.alexend-bot.ru
# Place this in /etc/nginx/sites-available/sites.alexend-bot.ru
# Then: ln -s /etc/nginx/sites-available/sites.alexend-bot.ru /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name sites.alexend-bot.ru;

    root /var/www/sites;
    index index.html;

    # Each published site lives in /var/www/sites/{slug}/
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # No cache for HTML/CSS/JS (sites update frequently)
    location ~* \.(html|css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    # Cache for images/fonts
    location ~* \.(jpg|jpeg|png|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

# After setting up SSL with certbot:
# sudo certbot --nginx -d sites.alexend-bot.ru
